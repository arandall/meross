; PlatformIO configuration for ESP8266 D1 Mini v4 Meross provisioner
[env:d1_mini]
platform      = espressif8266
board         = d1_mini
framework     = arduino

lib_deps =
    bblanchon/ArduinoJson @ ^7
    Densaugeo/base64 @ ^1.2.1

monitor_speed = 115200
upload_speed  = 921600

build_flags =
    -D NDEBUG

; Native environment for running unit tests on the host machine.
; Exclude all src/ files so Arduino-only code (main.cpp, mdp.cpp) is
; never compiled. Densaugeo/base64 is pure C++ — no Arduino deps.
; build_flags adds the library src/ explicitly because PlatformIO's LDF
; does not scan test files for dependencies when build_src_filter=-<*>.
[env:native]
platform         = native
build_src_filter = -<*>
lib_deps         = Densaugeo/base64 @ ^1.2.1
build_flags      = -I.pio/libdeps/native/base64/src
